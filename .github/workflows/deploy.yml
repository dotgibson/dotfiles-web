name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages. `actions: read` lets the build read the
# latest workflow-run conclusion for the repo cards (other public repos resolve
# anonymously; private/forbidden ones just fall back to no CI badge).
permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

# Serialize per ref: production deploys on main never get blocked by PR
# validation runs (each ref gets its own group). Don't cancel in-progress
# production deploys; do cancel superseded PR builds.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build
        env:
          # Higher GitHub API rate limit + Actions access for the live repo-card
          # badges. Build is resilient if this is unset or the API is unreachable.
          GITHUB_TOKEN: ${{ github.token }}

      # On pull requests we only build to validate; the upload + deploy below
      # are gated to pushes to main so PRs don't touch the live site.
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
