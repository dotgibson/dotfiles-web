name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      dotfiles_ref:
        description: "Tag/branch to pin the fleet to when regenerating metrics (e.g. v1.0.0). Empty = ship the committed src/data/generated.json as-is."
        required: false
        default: ""
  # Lets a source repo rebuild & redeploy the docs — the static-site equivalent of
  # a cache purge (there is no per-request cache to invalidate; you re-publish the
  # artifact). Two event types, both POSTed as a repository_dispatch:
  #   release — pin the whole fleet to a freshly cut tag, then rebuild:
  #     {"event_type":"release","client_payload":{"ref":"v1.0.0"}}
  #   refresh — rebuild from each repo's DEFAULT branch (no ref needed), e.g. on a
  #     push to a source repo whose CHANGELOG/metrics the showcase mirrors.
  #     {"event_type":"refresh"}
  # The POST is authenticated by the dispatching repo's WEBHOOK_SECRET (a PAT
  # with this repo's contents:write) — GitHub verifies the caller via that token, so
  # no HMAC signature layer is needed on this (static, server-less) side.
  repository_dispatch:
    types: [release, refresh]

# Allow GITHUB_TOKEN to deploy to Pages. `actions: read` lets the build read the
# latest workflow-run conclusion for the repo cards (other public repos resolve
# anonymously; private/forbidden ones just fall back to no CI badge).
permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

# Serialize per ref: production deploys on main never get blocked by PR
# validation runs (each ref gets its own group). Don't cancel in-progress
# production deploys; do cancel superseded PR builds.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Pinned-metrics build (opt-in). When a ref is supplied — via workflow_dispatch
      # or a `release` repository_dispatch — check out the whole fleet at that ref so
      # the next step can regenerate src/data/generated.json from a RELEASE rather
      # than whatever was last committed. Fails fast if a repo can't be cloned at
      # all, so a release build can never silently ship the committed snapshot; a
      # missing TAG (OS repos version independently — see core.lock) falls back to
      # the default branch. Normal pushes skip this entirely.
      - name: Check out the fleet at a pinned ref
        id: fleet
        if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.dotfiles_ref != '') || github.event_name == 'repository_dispatch' }}
        env:
          REF: ${{ github.event.inputs.dotfiles_ref || github.event.client_payload.ref }}
          EVENT_ACTION: ${{ github.event.action }}
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          # A `release` dispatch (or a manual pinned build) MUST carry a ref so the
          # docs are built from a TAGGED fleet — bail loudly if it doesn't. A
          # `refresh` dispatch intentionally carries no ref: it rebuilds from each
          # repo's default branch (the cache-purge path), so an empty REF is fine.
          if [ -z "${REF:-}" ] && [ "${EVENT_ACTION:-}" != "refresh" ]; then
            echo "::error::pinned build triggered without a ref (set dotfiles_ref / client_payload.ref)"
            exit 1
          fi
          root="${RUNNER_TEMP}/fleet"
          mkdir -p "$root"
          repos="dotfiles-core dotfiles-MacBook dotfiles-Windows dotfiles-Kali \
                 dotfiles-Fedora dotfiles-Arch dotfiles-openSUSE dotfiles-Alpine dotfiles-Gentoo"
          for r in $repos; do
            url="https://x-access-token:${GH_TOKEN}@github.com/${OWNER}/${r}.git"
            if [ -n "${REF:-}" ] && git clone --depth 1 --branch "$REF" "$url" "$root/$r" 2>/dev/null; then
              echo "cloned $r @ $REF"
            elif git clone --depth 1 "$url" "$root/$r" 2>/dev/null; then
              echo "cloned $r @ default branch${REF:+ ($REF not found)}"
            else
              echo "::error::could not clone $r at ${REF:-default branch}"
              exit 1
            fi
          done
          echo "root=$root" >> "$GITHUB_OUTPUT"

      - name: Regenerate metrics + config snippets from the pinned fleet
        if: ${{ steps.fleet.outputs.root != '' }}
        run: npm run data # metrics + snippets, both defensive (no-op if a repo is absent)
        env:
          DOTFILES_ROOT: ${{ steps.fleet.outputs.root }}

      - name: Build with Astro
        run: npm run build
        env:
          # Higher GitHub API rate limit + Actions access for the live repo-card
          # badges. Build is resilient if this is unset or the API is unreachable.
          GITHUB_TOKEN: ${{ github.token }}

      # On pull requests we only build to validate; the upload + deploy below
      # are gated to pushes to main so PRs don't touch the live site.
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
