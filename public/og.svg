<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="dotgibson — a layered terminal ecosystem">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1b26"/>
      <stop offset="1" stop-color="#16161e"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2f7"/>
      <stop offset="0.55" stop-color="#bb9af7"/>
      <stop offset="1" stop-color="#7dcfff"/>
    </linearGradient>
    <linearGradient id="ringTop" x1="7" y1="32" x2="57" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7aa2f7"/>
      <stop offset="0.35" stop-color="#9ece6a"/>
      <stop offset="0.7" stop-color="#e0af68"/>
      <stop offset="1" stop-color="#f7768e"/>
    </linearGradient>
    <linearGradient id="ringBot" x1="7" y1="32" x2="57" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7aa2f7"/>
      <stop offset="0.5" stop-color="#bb9af7"/>
      <stop offset="1" stop-color="#f7768e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1010" cy="90" r="340" fill="#7aa2f7" opacity="0.10"/>
  <circle cx="150" cy="560" r="300" fill="#bb9af7" opacity="0.08"/>

  <!-- logo mark -->
  <g transform="translate(120 155) scale(5)">
    <rect width="64" height="64" rx="14" fill="#1a1b26" stroke="#292e42" stroke-width="1"/>
    <g fill="none" stroke-width="5.5">
      <path d="M7 32 A25 25 0 0 1 57 32" stroke="url(#ringTop)"/>
      <path d="M57 32 A25 25 0 0 1 7 32" stroke="url(#ringBot)"/>
    </g>
    <g stroke="#e6b166" fill="none" stroke-linecap="round">
      <path d="M15.5 30.5 c2 -3 5 -3 7 0 c2 3 5 3 7 0" stroke-width="3.4"/>
      <path d="M28 42 L40 22" stroke-width="6"/>
    </g>
    <circle cx="43" cy="40" r="3.1" fill="#7dcfff"/>
  </g>

  <!-- wordmark + copy -->
  <text x="500" y="258" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,monospace" font-size="27" font-weight="600" letter-spacing="6" fill="#7aa2f7">LAYERED TERMINAL ECOSYSTEM</text>
  <text x="500" y="368" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,monospace" font-size="104" font-weight="800" fill="url(#wordmark)">dotgibson</text>
  <rect x="502" y="392" width="330" height="6" rx="3" fill="url(#wordmark)"/>
  <text x="500" y="452" font-family="'Inter','Segoe UI',sans-serif" font-size="34" font-weight="500" fill="#a9b1d6">One Core. Every machine. Clone-and-go.</text>
  <text x="500" y="500" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,monospace" font-size="25" fill="#565f89">Core → OS-native → Role</text>
</svg>
